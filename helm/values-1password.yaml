#
# values-1password.yaml — Helm values overlay for 1Password secrets integration
#
# Usage: merge with your base values when deploying:
#   helm upgrade openclaw openclaw-community/openclaw \
#     --namespace openclaw \
#     --values /path/to/base-values.yaml \
#     --values /path/to/values-1password.yaml
#
# Prerequisites:
#   1. Create the k8s secret first:
#      kubectl create secret generic openclaw-1password \
#        --namespace openclaw \
#        --from-literal=OP_SERVICE_ACCOUNT_TOKEN="ops_eyJ..."
#
#   2. Install op CLI in the container (add to install-dev-tools.sh or use
#      values-dev-tools.yaml init container)
#
# Once deployed, configure OpenClaw to use 1Password SecretRefs:
#   kubectl exec -n openclaw deploy/openclaw -c main -- openclaw secrets configure
#

app-template:
  controllers:
    main:
      containers:
        main:
          envFrom:
            - secretRef:
                name: openclaw-1password
