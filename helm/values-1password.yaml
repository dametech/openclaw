#
# values-1password.yaml — Helm values overlay for 1Password integration
#
# Injects OP_SERVICE_ACCOUNT_TOKEN from a K8s Secret so the op CLI
# can authenticate with 1Password Service Accounts.
#
# Prerequisites:
#   kubectl create secret generic openclaw-1password \
#     --namespace openclaw \
#     --from-literal=OP_SERVICE_ACCOUNT_TOKEN='ops_YOUR_TOKEN_HERE'
#
# Usage:
#   helm upgrade openclaw openclaw-community/openclaw \
#     --namespace openclaw \
#     --values base-values.yaml \
#     --values helm/values-1password.yaml
#
# This is additive — merge with your existing values.
# The envFrom array must include ALL secretRefs (Helm replaces arrays, not appends).
#

app-template:
  controllers:
    main:
      containers:
        main:
          envFrom:
            - secretRef:
                name: openclaw-env-secret    # Existing: ANTHROPIC_API_KEY
            - secretRef:
                name: openclaw-1password     # New: OP_SERVICE_ACCOUNT_TOKEN
