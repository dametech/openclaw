<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Name — DAME</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-[#1B4B8A] text-white px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-semibold">App Name</h1>
      <p class="text-sm opacity-75">Brief description</p>
    </div>
    <span class="text-xs opacity-60" id="timestamp"></span>
  </header>

  <!-- Main content -->
  <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
    <div class="bg-white rounded shadow p-6">
      <p class="text-gray-500">Content goes here.</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center text-xs text-gray-400 py-4">
    DAME Internal · <a href="https://apps.dametech.net" class="hover:underline">All Apps</a>
  </footer>

  <script>
    document.getElementById('timestamp').textContent =
      new Date().toLocaleString('en-AU', { timeZone: 'Australia/Melbourne' }) + ' AEDT';
  </script>
</body>
</html>
