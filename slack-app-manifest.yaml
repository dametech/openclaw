display_information:
  name: OpenClaw Bot
  description: AI-powered automation assistant for your workspace
  background_color: "#2c3e50"
  long_description: OpenClaw is an AI assistant that helps with DevOps, development, and automation tasks. It can execute commands, interact with tools, and help manage your infrastructure. It is for DAME employees only.

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: OpenClaw
    always_online: true

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - chat:write.customize
      - channels:join
      - channels:history
      - channels:read
      - groups:history
      - groups:write
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - app_mentions:read
      - reactions:read
      - reactions:write
      - pins:read
      - pins:write
      - emoji:read
      - commands
      - files:read
      - files:write

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - reaction_added
      - reaction_removed
      - member_joined_channel
      - member_left_channel
      - channel_rename
      - pin_added
      - pin_removed
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
