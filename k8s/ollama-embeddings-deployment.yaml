apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-embeddings
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: ollama-embeddings
    app.kubernetes.io/instance: ollama-embeddings
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama-embeddings
      app.kubernetes.io/instance: ollama-embeddings
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-embeddings
        app.kubernetes.io/instance: ollama-embeddings
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.13.5
          imagePullPolicy: IfNotPresent
          env:
            - name: OLLAMA_NUM_PARALLEL
              value: "2"
            - name: OLLAMA_MAX_QUEUE
              value: "32"
            - name: OLLAMA_KEEP_ALIVE
              value: "30m"
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              ollama serve &
              server_pid=$!
              trap 'kill $server_pid' EXIT
              until ollama list >/dev/null 2>&1; do
                sleep 2
              done
              ollama pull ${OLLAMA_EMBEDDINGS_MODEL}
              wait $server_pid
          ports:
            - containerPort: 11434
              name: http
          resources:
            requests:
              cpu: 2
              memory: 2Gi
            limits:
              cpu: 3
              memory: 6Gi
