apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-embeddings
  namespace: ${NAMESPACE}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ollama-embeddings
      app.kubernetes.io/instance: ollama-embeddings
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openclaw
      ports:
        - protocol: TCP
          port: 11434
